[build]
  command = "node scripts/generate-hub.js"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."hubspot"]
  runtime = "python3.9"

[functions."salesforce"]
  runtime = "python3.9"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
